<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ApplyFlow</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="header">
      <div class="logo-section">
        <img src="../images/bot3.png" class="logo-img" />
        <div>
          <h2>ApplyFlow</h2>
          <!-- <span>AI Job Assistant</span> -->
        </div>
      </div>
      <!-- <button id="close-btn" class="close-btn">✕</button> -->
    </div>

    <div class="container">
      <div id="support-status">⏳ Checking support...</div>

      <div class="hero-card">
        <div class="badge">⚡ Saved 9+ minutes</div>

        <h3>Autofill this job</h3>

        <p>Let ApplyFlow automatically complete job applications using your profile and resume.</p>

        <button class="apply-btn" id="apply">

      </div>

      <div id="message" class="message"></div>

      <div class="footer">Powered by ApplyFlow AI</div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
